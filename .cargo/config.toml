# Align all function entry points AND all non-fallthrough block targets
# (loop headers, branch targets) to 64-byte cache line boundaries.

# -align-all-functions=64         : function entries always cache-line aligned
# -align-all-nofallthru-blocks=64 : loop headers/branch targets always aligned

# Together these prevent LTO layout shifts from moving hot inner loops to
# bad cache-line positions when any function's code size changes.
[build]
rustflags = [
  "-C", "target-feature=+bmi2",
  "-C", "llvm-args=-align-all-functions=64",
  "-C", "llvm-args=-align-all-nofallthru-blocks=64",
]

# align-all-* flags cause LLVM's DeleteDeadPHIs pass to overflow the default
# 8 MiB thread stack when compiling large loop-heavy functions (LLVM bug #21).
# 16 MiB is enough; this env var is picked up by rustc's codegen threads.
[env]
RUST_MIN_STACK = "16777216"
