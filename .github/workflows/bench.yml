name: Benchmarks

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  bench:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ubuntu-latest ships with Rust stable — no extra action needed.
      - name: Update Rust
        run: rustup update stable && rustup default stable

      # Restore the last baseline saved from master.
      - name: Restore bench baseline
        uses: actions/cache/restore@v4
        with:
          path: bench-ci-baseline.txt
          key: bench-baseline-master
          restore-keys: bench-baseline-

      - name: Run benchmarks (single-threaded)
        run: |
          cargo test --release --test bench -- --nocapture --test-threads=1 \
            2>&1 | tee bench-ci-new.txt

      - name: Compare against baseline
        shell: bash
        run: |
          set -o pipefail
          if [ -f bench-ci-baseline.txt ]; then
            python3 bench-compare.py bench-ci-baseline.txt bench-ci-new.txt \
              --threshold 17 --min-ns 5 \
              | tee bench-ci-diff.txt
          else
            echo "No baseline — this run becomes the new baseline."
            cp bench-ci-new.txt bench-ci-diff.txt
          fi

      - name: Write job summary
        if: always()
        run: |
          echo '## Benchmark results' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat bench-ci-diff.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      # Update stored baseline only on master pushes.
      - name: Save baseline cache
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: cp bench-ci-new.txt bench-ci-baseline.txt

      - name: Save baseline
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/cache/save@v4
        with:
          path: bench-ci-baseline.txt
          key: bench-baseline-master-${{ github.sha }}
