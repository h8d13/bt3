name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build --release --verbose
    - name: Run unit tests
      # bench.rs has 1M-iteration loops that time out in CI without --test-threads=1.
      # Doc tests and unit tests run here; the bench workflow handles performance testing.
      run: cargo test --release --lib --verbose
    - name: Run doc tests
      run: cargo test --release --doc --verbose
